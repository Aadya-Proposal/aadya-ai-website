<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Proposal for Changes — Aadya AI</title>
<meta name="robots" content="noindex, nofollow">
<style>
  @font-face {
    font-family: 'Plus Jakarta Sans';
    font-display: swap;
  }
  :root {
    --navy: #1B3A6B;
    --navy-dark: #0F2444;
    --gold: #C48014;
    --off-white: #F7F8FA;
    --border: #E5E9F0;
    --muted: #6B7280;
    --text: #1F2937;
    --success: #16A34A;
    --success-bg: #DCFCE7;
    --error: #DC2626;
    --error-bg: #FEE2E2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: linear-gradient(180deg, var(--off-white) 0%, #EEF2F9 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 1px 2px rgba(15,45,107,0.04), 0 8px 24px rgba(15,45,107,0.08);
    text-align: center;
  }
  .logo-mark {
    width: 44px;
    height: 44px;
    margin: 0 auto 20px;
    background: var(--navy);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-mark svg { width: 22px; height: 22px; }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--navy-dark);
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .subtitle strong { color: var(--text); font-weight: 600; }
  textarea {
    width: 100%;
    min-height: 80px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    resize: vertical;
    margin-bottom: 16px;
  }
  textarea:focus { outline: none; border-color: var(--navy); }
  textarea::placeholder { color: #9CA3AF; }
  .btn-flag {
    width: 100%;
    background: linear-gradient(180deg, var(--gold) 0%, #A8690F 100%);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 15px 24px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-flag:hover:not(:disabled) { transform: translateY(-1px); }
  .btn-flag:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-secondary {
    display: inline-block;
    margin-top: 14px;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }
  .btn-secondary:hover { color: var(--navy); border-bottom-color: var(--navy); }
  .status {
    display: none;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    margin-top: 20px;
  }
  .status.show { display: block; }
  .status.success { background: var(--success-bg); color: var(--success); }
  .status.error { background: var(--error-bg); color: var(--error); }
  .missing-token { font-size: 14px; color: var(--muted); }
</style>
</head>
<body>

<div class="card">
  <div class="logo-mark">
    <svg viewBox="0 0 20 20" fill="none"><path d="M10 1 L19 19 H13 L10 11 L7 19 H1 Z" fill="white"/></svg>
  </div>

  <div id="content-with-token" style="display:none;">
    <h1>Flag for changes</h1>
    <p class="subtitle">
      This holds <strong id="proposal-title">—</strong> for <strong id="client-name">—</strong>
      — it won't be sent until you regenerate it from the form.
    </p>
    <textarea id="note" placeholder="Optional: note what needs fixing, for your own reference later"></textarea>
    <button class="btn-flag" id="reject-btn" onclick="rejectProposal()">
      Hold this proposal
    </button>
    <br>
    <a class="btn-secondary" id="approve-link" href="#">Actually, it's fine — approve &amp; send</a>
    <div class="status" id="status"></div>
  </div>

  <div id="content-no-token" style="display:none;">
    <h1>Link incomplete</h1>
    <p class="missing-token">
      This link is missing some information. Please open it directly from
      the review email rather than a forwarded or copied link.
    </p>
  </div>
</div>

<script>
  // ── CONFIG ──
  // Replace with the real Make.com webhook URL once the approval scenario is built.
  const REJECT_WEBHOOK_URL = "https://hook.eu1.make.com/REPLACE_WITH_REJECT_WEBHOOK";

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const client = params.get('client');
  const title = params.get('title');

  if (token) {
    document.getElementById('content-with-token').style.display = 'block';
    document.getElementById('client-name').textContent = client ? decodeURIComponent(client) : 'your client';
    document.getElementById('proposal-title').textContent = title ? decodeURIComponent(title) : 'this proposal';
    document.getElementById('approve-link').href = 'approve.html?' + params.toString();
  } else {
    document.getElementById('content-no-token').style.display = 'block';
  }

  async function rejectProposal() {
    const btn = document.getElementById('reject-btn');
    const status = document.getElementById('status');
    const note = document.getElementById('note').value;
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const res = await fetch(REJECT_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, action: 'reject', note: note })
      });

      if (!res.ok) throw new Error('Request failed');

      status.textContent = "Held. Head back to the form whenever you're ready to regenerate it.";
      status.className = 'status show success';
      btn.textContent = 'Held ✓';
    } catch (err) {
      status.textContent = "Something went wrong. It hasn't been sent, but please try again to record this.";
      status.className = 'status show error';
      btn.disabled = false;
      btn.textContent = 'Hold this proposal';
    }
  }
</script>

</body>
</html>
