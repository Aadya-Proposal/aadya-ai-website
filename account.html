<style>
:root {
  --navy: #0F2D6B;
  --blue: #3B82F6;
  --blue-light: #EEF4FF;
  --text: #1a1a2e;
  --muted: #64748b;
  --border: #e2e8f0;
  --white: #ffffff;
  --bg: #f5f7fb;
  --success: #10b981;
  --danger: #ef4444;
  --card-shadow: 0 2px 16px rgba(15,45,107,0.07);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* NAVBAR */
.navbar {
  background:var(--white);
  padding:0 40px;
  height:72px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 1px 8px rgba(0,0,0,0.04);
}
.logo { cursor:pointer; }
.logo img { height:48px; display:block; }
.back-link {
  display:flex;
  align-items:center;
  gap:6px;
  color:var(--navy);
  font-weight:600;
  font-size:14px;
  text-decoration:none;
  padding:8px 16px;
  border-radius:10px;
  border:1.5px solid var(--border);
  transition:all 0.2s;
}
.back-link:hover { background:var(--blue-light); border-color:var(--blue); }

/* HERO */
.hero {
  background:linear-gradient(135deg, var(--navy) 0%, #1e4db7 100%);
  padding:48px 40px;
  color:white;
  position:relative;
  overflow:hidden;
}
.hero::before {
  content:'';
  position:absolute;
  top:-40px; right:-60px;
  width:320px; height:320px;
  background:rgba(59,130,246,0.15);
  border-radius:50%;
}
.hero::after {
  content:'';
  position:absolute;
  bottom:-60px; left:30%;
  width:200px; height:200px;
  background:rgba(255,255,255,0.04);
  border-radius:50%;
}
.hero-inner {
  max-width:800px;
  margin:0 auto;
  position:relative;
  z-index:1;
  display:flex;
  align-items:center;
  gap:24px;
}
.hero-avatar {
  width:72px; height:72px;
  background:rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.3);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif;
  font-size:28px; font-weight:800;
  color:white;
  flex-shrink:0;
}
.hero-text h1 { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; margin-bottom:6px; }
.hero-text p { color:rgba(255,255,255,0.75); font-size:15px; }

/* MAIN */
.main-content {
  max-width:800px;
  margin:0 auto;
  padding:32px 40px 60px;
  display:flex;
  flex-direction:column;
  gap:20px;
}
.card {
  background:var(--white);
  border-radius:20px;
  padding:28px;
  box-shadow:var(--card-shadow);
  border:1px solid var(--border);
}
.card-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.card h2 { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; color:var(--navy); }
.card-badge {
  background:var(--blue-light);
  color:var(--blue);
  font-size:11px;
  font-weight:700;
  padding:4px 10px;
  border-radius:999px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

/* FORM */
.form-group { margin-bottom:16px; }
.form-label {
  font-size:12px;
  font-weight:600;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.4px;
  margin-bottom:6px;
  display:block;
}
.form-input {
  width:100%;
  padding:12px 16px;
  border:1.5px solid var(--border);
  border-radius:12px;
  font-size:15px;
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  background:var(--white);
  outline:none;
  transition:border-color 0.2s;
}
.form-input:focus { border-color:var(--blue); }
.form-input:disabled { background:#f8fafc; color:var(--muted); cursor:not-allowed; }
.save-row { display:flex; align-items:center; gap:12px; margin-top:4px; }
.save-btn {
  background:var(--navy);
  color:white;
  border:none;
  padding:12px 24px;
  border-radius:12px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all 0.2s;
}
.save-btn:hover { background:var(--blue); }
.save-confirm {
  font-size:14px;
  font-weight:600;
  color:var(--success);
  opacity:0;
  transition:opacity 0.3s;
}
.save-confirm.visible { opacity:1; }

/* PLAN */
.plan-current {
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px 20px;
  background:var(--blue-light);
  border-radius:14px;
  margin-bottom:20px;
}
.plan-icon { font-size:24px; }
.plan-name { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; color:var(--navy); }
.plan-price { font-size:13px; color:var(--muted); margin-top:2px; }
.plan-badge-inline {
  margin-left:auto;
  background:var(--navy);
  color:white;
  padding:4px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.plan-badge-inline.pro { background:linear-gradient(135deg,#6366f1,#3B82F6); }

.upgrade-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.upgrade-card {
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:18px;
  text-align:center;
}
.upgrade-card-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:var(--navy); margin-bottom:4px; }
.upgrade-card-price { font-size:13px; color:var(--muted); margin-bottom:14px; }
.upgrade-btn {
  display:block;
  width:100%;
  padding:10px;
  border-radius:10px;
  font-size:13px;
  font-weight:700;
  text-decoration:none;
  text-align:center;
  cursor:pointer;
  border:none;
  font-family:'DM Sans',sans-serif;
  transition:all 0.2s;
  margin-bottom:8px;
  color:white;
}
.upgrade-btn.inr { background:var(--navy); }
.upgrade-btn.inr:hover { background:var(--blue); }
.upgrade-btn.usd { background:var(--success); }
.upgrade-btn.usd:hover { filter:brightness(0.9); }
.upgrade-label { font-size:11px; color:var(--muted); }

.pro-thank-you {
  text-align:center;
  padding:24px 20px;
  background:linear-gradient(135deg,var(--navy),#1e4db7);
  border-radius:14px;
  color:white;
}
.pro-thank-you .emoji { font-size:36px; margin-bottom:10px; }
.pro-thank-you p { font-size:15px; font-weight:600; }

/* SIGN OUT */
.signout-btn {
  background:transparent;
  color:var(--danger);
  border:1.5px solid var(--danger);
  padding:12px 24px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
  font-family:'DM Sans',sans-serif;
  transition:all 0.2s;
}
.signout-btn:hover { background:var(--danger); color:white; }

/* LOADING */
.loading-screen {
  position:fixed; inset:0;
  background:var(--navy);
  display:flex; align-items:center; justify-content:center;
  z-index:9999;
  transition:opacity 0.3s;
}
.loading-screen.hidden { opacity:0; pointer-events:none; }
.loading-text { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; color:white; }
.loading-text span { color:var(--blue); }

@media(max-width:768px) {
  .navbar { padding:0 20px; }
  .hero { padding:32px 20px; }
  .hero-inner { flex-direction:column; align-items:flex-start; gap:16px; }
  .hero-text h1 { font-size:26px; }
  .main-content { padding:20px 20px 40px; }
  .upgrade-grid { grid-template-columns:1fr; }
}
</style>
</head>

async function saveName() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) {

  }

  try {
    const { error } = await supabaseClient
      .from('users')
      .upsert(

      );

    if (error) throw error;

    document.getElementById('heroAvatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('heroGreeting').textContent = `Hi, ${name}`;

    const confirm = document.getElementById('saveConfirm');
    confirm.classList.add('visible');
