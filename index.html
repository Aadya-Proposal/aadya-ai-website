<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Aadya AI</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f7fb;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .login-box{
      width:100%;
      max-width:420px;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .logo{
      text-align:center;
      margin-bottom:30px;
    }

    .logo img{
      height:80px;
    }

    h1{
      font-size:32px;
      color:#0f172a;
      margin-bottom:12px;
      text-align:center;
    }

    p{
      color:#64748b;
      text-align:center;
      margin-bottom:30px;
      line-height:1.6;
    }

    .google-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#2563eb;
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .google-btn:hover{
      opacity:0.9;
    }

    .divider{
      text-align:center;
      margin:24px 0;
      color:#94a3b8;
      font-size:14px;
    }

    .email-input{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #dbe2ea;
      margin-bottom:12px;
      font-size:15px;
    }

    .email-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#0f172a;
      color:white;
      font-weight:600;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <div class="login-box">

    <div class="logo">
      <img src="logo.png" alt="Aadya AI Logo">
    </div>

    <h1>Welcome to Aadya AI</h1>

    <p>
      AI-powered proposal generation platform.
    </p>

    <button
      class="google-btn"
      onclick="signInWithGoogle()"
    >
      Continue with Google
    </button>

    <div class="divider">
      OR
    </div>

    <input
      id="emailInput"
      class="email-input"
      type="email"
      placeholder="Enter your email"
    >

    <button
      class="email-btn"
      onclick="signInWithEmail()"
    >
      Continue with Email
    </button>

  </div>

  <script>

    const SUPABASE_URL =
      "https://rscpsmwqtkduahhaejtv.supabase.co";

    const SUPABASE_KEY =
      "sb_publishable_kU78DNrxlnaF-3dRn0IoNA_sHIY1boA";

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    async function signInWithGoogle() {

      await supabaseClient.auth.signInWithOAuth({

        provider: 'google',

        options: {

          redirectTo:
            'https://aadya-ai.com/dashboard.html',

          queryParams: {
            prompt: 'select_account'
          }

        }

      });

    }

    async function signInWithEmail() {

      const email =
        document.getElementById("emailInput").value;

      if (!email) {

        alert("Please enter your email");
        return;

      }

      const { error } =
        await supabaseClient.auth.signInWithOtp({

          email: email,

          options: {

            emailRedirectTo:
              'https://aadya-ai.com/dashboard.html'

          }

        });

      if (error) {

        alert(error.message);

      } else {

        alert(
          "Magic login link sent to your email."
        );

      }

    }

  </script>

</body>

</html>
