<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadya AI Dashboard</title>
</head>
<body>

<h1>Welcome to Aadya AI</h1>

<p id="user-email">Checking login...</p>

<button onclick="signOut()">Logout</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = 'https://rscpsmwqtkduahhaejtv.supabase.co';
const supabaseKey = 'sb_publishable_kU78DNrxlnaF-3dRn0IoNA_sHIY1boA';

const aadyaSupabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function checkUser() {

  const {
    data: { user }
  } = await aadyaSupabase.auth.getUser();

  if (!user) {
    window.location.href = "/";
    return;
  }

  document.getElementById("user-email").innerText =
    "Logged in as: " + user.email;
}

async function signOut() {
  await aadyaSupabase.auth.signOut();
  window.location.href = "/";
}

checkUser();

</script>

</body>
</html>
