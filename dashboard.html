<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Aadya AI Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f5f7fb;
      color:#0f172a;
    }

    .navbar{
      background:white;
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #e2e8f0;
    }

    .logo img{
      height:72px;
    }

    .nav-right{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .user-email{
      background:#eef2ff;
      color:#2563eb;
      padding:12px 20px;
      border-radius:999px;
      font-weight:600;
    }

    .logout-btn{
      background:#ef4444;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:14px;
      cursor:pointer;
      font-weight:600;
    }

    .hero{
      padding:60px 80px 30px;
    }

    .hero h1{
      font-size:60px;
      margin-bottom:20px;
    }

    .hero p{
      color:#64748b;
      font-size:22px;
      line-height:1.7;
    }

    .dashboard-grid{
      padding:0 80px 80px;

      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:24px;
    }

    .card{
      background:white;
      border-radius:24px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
    }

    .card h2{
      margin-bottom:20px;
    }

    .proposal-form input,
    .proposal-form textarea{
      width:100%;
      padding:14px;
      margin-bottom:14px;
      border-radius:12px;
      border:1px solid #dbe2ea;
      font-size:15px;
    }

    .proposal-form button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#2563eb;
      color:white;
      font-weight:700;
      cursor:pointer;
    }

    .history-item{
      padding:14px 0;
      border-bottom:1px solid #e2e8f0;
    }

    .usage-bar{
      width:100%;
      height:16px;
      background:#e2e8f0;
      border-radius:999px;
      overflow:hidden;
      margin-top:18px;
    }

    .usage-fill{
      width:40%;
      height:100%;
      background:#2563eb;
    }

  </style>

</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo">
      <img src="logo.png" alt="Aadya AI">
    </div>

    <div class="nav-right">

      <div
        class="user-email"
        id="userEmail"
      >
        Loading...
      </div>

      <button
        class="logout-btn"
        onclick="logout()"
      >
        Logout
      </button>

    </div>

  </nav>

  <!-- HERO -->

  <section class="hero">

    <h1>
      Welcome back 👋
    </h1>

    <p>
      Generate professional proposals and
      business documents instantly using Aadya AI.
    </p>

  </section>

  <!-- DASHBOARD -->

  <section class="dashboard-grid">

    <div class="card">

      <h2>Generate Proposal</h2>

      <div class="proposal-form">

        <input
          type="text"
          placeholder="Client Name"
        >

        <input
          type="text"
          placeholder="Project Title"
        >

        <textarea
          rows="6"
          placeholder="Project Description"
        ></textarea>

        <button>
          Generate Proposal
        </button>

      </div>

    </div>

    <div class="card">

      <h2>Proposal History</h2>

      <div class="history-item">
        Branding Proposal.pdf
      </div>

      <div class="history-item">
        SaaS Scope of Work.pdf
      </div>

      <div class="history-item">
        Marketing Proposal.pdf
      </div>

    </div>

    <div class="card">

      <h2>Plan Usage</h2>

      <p>
        4 / 10 proposals used this month
      </p>

      <div class="usage-bar">
        <div class="usage-fill"></div>
      </div>

    </div>

  </section>

  <!-- SUPABASE -->

  <script>

    const SUPABASE_URL =
      "https://rscpsmwqtkduahhaejtv.supabase.co";

    const SUPABASE_KEY =
      "sb_publishable_kU78DNrxlnaF-3dRn0IoNA_sHIY1boA";

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    async function checkUser(){

      const {
        data:{ user },
      } = await supabaseClient.auth.getUser();

      if(!user){

        window.location.href =
          "https://aadya-ai.com";

        return;

      }

      document.getElementById("userEmail")
        .innerText = user.email;

    }

    async function logout(){

      await supabaseClient.auth.signOut();

      localStorage.clear();
      sessionStorage.clear();

      window.location.href =
        "https://aadya-ai.com";

    }

    checkUser();

  </script>

</body>

</html>
